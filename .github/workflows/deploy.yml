---
name: Deploy SyntaxSidekick Child Theme

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-syntaxsidekick-child-theme
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Child Theme via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python for YAML validation
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate workflow YAML syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet yamllint
          yamllint -d "{extends: default, rules: {line-length: disable}}" .github/workflows/deploy.yml

      - name: Validate deployment configuration
        shell: bash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET: ${{ secrets.FTP_TARGET }}
        run: |
          set -euo pipefail

          missing=0
          for key in FTP_HOST FTP_USERNAME FTP_PASSWORD FTP_TARGET; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required repository secret: ${key}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::error::Deployment stopped because one or more required secrets are missing."
            exit 1
          fi

          expected="/public_html/wp-content/themes/syntaxsidekick-child/"
          normalized_target="${FTP_TARGET%/}/"

          if [ "$normalized_target" != "$expected" ]; then
            echo "::error::FTP_TARGET must be exactly ${expected} (current: ${normalized_target})."
            exit 1
          fi

          if [ ! -d "wp-content/themes/syntaxsidekick-child" ]; then
            echo "::error::Local child theme directory was not found at wp-content/themes/syntaxsidekick-child"
            exit 1
          fi

          echo "Validated deployment root: ${normalized_target}"
          echo "Local deployment source: wp-content/themes/syntaxsidekick-child"

      - name: Show files in deployment scope
        shell: bash
        run: |
          set -euo pipefail
          echo "Files available in child theme:"
          find wp-content/themes/syntaxsidekick-child -type f | wc -l

      - name: Generate deploy metadata
        shell: bash
        env:
          GIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          DEPLOY_ID="${GIT_SHA:0:12}"
          DEPLOY_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > wp-content/themes/syntaxsidekick-child/assets/deploy-meta.json <<EOF
          {
            "deploy_id": "${DEPLOY_ID}",
            "commit": "${GIT_SHA}",
            "run_id": "${RUN_ID}",
            "deployed_at_utc": "${DEPLOY_TIME}"
          }
          EOF

          echo "Generated deploy metadata with deploy_id=${DEPLOY_ID}"

      - name: Deploy changed child theme files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./wp-content/themes/syntaxsidekick-child/
          server-dir: ${{ secrets.FTP_TARGET }}
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git/**
            **/.github/**
            **/.vscode/**
            **/.idea/**
            **/node_modules/**
            **/vendor/**
            **/package-lock.json
            **/composer.json
            **/composer.lock
            **/README.md
            **/*.zip
            **/.DS_Store
            **/Thumbs.db
            **/*.log

      - name: Verify production serves latest deploy marker
        shell: bash
        env:
          PROD_SITE_URL: ${{ secrets.PROD_SITE_URL }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_SITE_URL:-}" ]; then
            PROD_SITE_URL="https://syntaxsidekick.com"
            echo "::warning::PROD_SITE_URL secret is missing. Falling back to ${PROD_SITE_URL}."
          fi

          DEPLOY_ID="${GIT_SHA:0:12}"
          VERIFY_URL="${PROD_SITE_URL%/}/?deploy_verify=${DEPLOY_ID}"

          echo "Checking deploy marker at ${VERIFY_URL}"

          html="$(curl -sS -L --max-time 45 "$VERIFY_URL")"

          if ! echo "$html" | grep -q "syntaxsidekick-deploy:${DEPLOY_ID}"; then
            echo "::error::Production does not yet serve deploy marker syntaxsidekick-deploy:${DEPLOY_ID}"
            echo "::error::Likely causes: stale server deploy, stale page cache, or stale optimization cache."
            exit 1
          fi

          echo "Verified production marker syntaxsidekick-deploy:${DEPLOY_ID}"
