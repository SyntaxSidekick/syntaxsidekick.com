---
name: Deploy SyntaxSidekick Child Theme

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-syntaxsidekick-child-theme
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Child Theme via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python for YAML validation
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate workflow YAML syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet yamllint
          yamllint -d "{extends: default, rules: {line-length: disable}}" .github/workflows/deploy.yml

      - name: Validate deployment configuration
        shell: bash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET: ${{ secrets.FTP_TARGET }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_SECURITY: ${{ secrets.FTP_SECURITY }}
          FTP_TIMEOUT: ${{ secrets.FTP_TIMEOUT }}
        run: |
          set -euo pipefail

          missing=0
          for key in FTP_HOST FTP_USERNAME FTP_PASSWORD FTP_TARGET; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required repository secret: ${key}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::error::Deployment stopped because one or more required secrets are missing."
            exit 1
          fi

          expected="/public_html/wp-content/themes/syntaxsidekick-child/"
          normalized_target="${FTP_TARGET%/}/"

          if [ "$normalized_target" != "$expected" ]; then
            echo "::error::FTP_TARGET must be exactly ${expected} (current: ${normalized_target})."
            exit 1
          fi

          if [ ! -d "wp-content/themes/syntaxsidekick-child" ]; then
            echo "::error::Local child theme directory was not found at wp-content/themes/syntaxsidekick-child"
            exit 1
          fi

          protocol="${FTP_PROTOCOL:-ftps}"
          if [[ "$protocol" != "ftp" && "$protocol" != "ftps" && "$protocol" != "ftps-legacy" ]]; then
            echo "::error::FTP_PROTOCOL must be ftp, ftps, or ftps-legacy (current: ${protocol})."
            exit 1
          fi

          port="${FTP_PORT:-21}"
          if ! [[ "$port" =~ ^[0-9]+$ ]]; then
            echo "::error::FTP_PORT must be a numeric value (current: ${port})."
            exit 1
          fi

          security="${FTP_SECURITY:-loose}"
          if [[ "$security" != "strict" && "$security" != "loose" ]]; then
            echo "::error::FTP_SECURITY must be strict or loose (current: ${security})."
            exit 1
          fi

          timeout="${FTP_TIMEOUT:-60000}"
          if ! [[ "$timeout" =~ ^[0-9]+$ ]]; then
            echo "::error::FTP_TIMEOUT must be milliseconds as a numeric value (current: ${timeout})."
            exit 1
          fi

          echo "Validated deployment root: ${normalized_target}"
          echo "Local deployment source: wp-content/themes/syntaxsidekick-child"
          echo "Connection settings: protocol=${protocol}, port=${port}, security=${security}, timeout=${timeout}ms"

      - name: Resolve FTP transport settings
        id: ftp_config
        shell: bash
        env:
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_SECURITY: ${{ secrets.FTP_SECURITY }}
          FTP_TIMEOUT: ${{ secrets.FTP_TIMEOUT }}
        run: |
          set -euo pipefail
          echo "protocol=${FTP_PROTOCOL:-ftps}" >> "$GITHUB_OUTPUT"
          echo "port=${FTP_PORT:-21}" >> "$GITHUB_OUTPUT"
          echo "security=${FTP_SECURITY:-loose}" >> "$GITHUB_OUTPUT"
          echo "timeout=${FTP_TIMEOUT:-60000}" >> "$GITHUB_OUTPUT"

      - name: Preflight FTP control connection
        shell: bash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ steps.ftp_config.outputs.port }}
        run: |
          set -euo pipefail
          echo "Checking TCP connectivity to ${FTP_HOST}:${FTP_PORT}"
          if timeout 15 bash -c "</dev/tcp/${FTP_HOST}/${FTP_PORT}"; then
            echo "TCP connectivity OK: ${FTP_HOST}:${FTP_PORT}"
          else
            echo "::error::Cannot open TCP connection to ${FTP_HOST}:${FTP_PORT}"
            echo "::error::Likely causes: wrong host/port, FTP blocked by provider firewall, or server requires SFTP."
            exit 1
          fi

      - name: Show files in deployment scope
        shell: bash
        run: |
          set -euo pipefail
          echo "Files available in child theme:"
          find wp-content/themes/syntaxsidekick-child -type f | wc -l

      - name: Generate deploy metadata
        shell: bash
        env:
          GIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          DEPLOY_ID="${GIT_SHA:0:12}"
          DEPLOY_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > wp-content/themes/syntaxsidekick-child/assets/deploy-meta.json <<EOF
          {
            "deploy_id": "${DEPLOY_ID}",
            "commit": "${GIT_SHA}",
            "run_id": "${RUN_ID}",
            "deployed_at_utc": "${DEPLOY_TIME}"
          }
          EOF

          echo "Generated deploy metadata with deploy_id=${DEPLOY_ID}"

      - name: Deploy changed child theme files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp_config.outputs.protocol }}
          port: ${{ steps.ftp_config.outputs.port }}
          security: ${{ steps.ftp_config.outputs.security }}
          timeout: ${{ steps.ftp_config.outputs.timeout }}
          log-level: verbose
          local-dir: ./wp-content/themes/syntaxsidekick-child/
          server-dir: ${{ secrets.FTP_TARGET }}
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git/**
            **/.github/**
            **/.vscode/**
            **/.idea/**
            **/node_modules/**
            **/vendor/**
            **/package-lock.json
            **/composer.json
            **/composer.lock
            **/README.md
            **/*.zip
            **/.DS_Store
            **/Thumbs.db
            **/*.log

      - name: Verify production serves latest deploy marker
        shell: bash
        env:
          PROD_SITE_URL: ${{ secrets.PROD_SITE_URL }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_SITE_URL:-}" ]; then
            PROD_SITE_URL="https://syntaxsidekick.com"
            echo "::warning::PROD_SITE_URL secret is missing. Falling back to ${PROD_SITE_URL}."
          fi

          DEPLOY_ID="${GIT_SHA:0:12}"
          VERIFY_URL="${PROD_SITE_URL%/}/?deploy_verify=${DEPLOY_ID}"

          echo "Checking deploy marker at ${VERIFY_URL}"

          html="$(curl -sS -L --max-time 45 "$VERIFY_URL")"

          if ! echo "$html" | grep -q "syntaxsidekick-deploy:${DEPLOY_ID}"; then
            echo "::error::Production does not yet serve deploy marker syntaxsidekick-deploy:${DEPLOY_ID}"
            echo "::error::Likely causes: stale server deploy, stale page cache, or stale optimization cache."
            exit 1
          fi

          echo "Verified production marker syntaxsidekick-deploy:${DEPLOY_ID}"
